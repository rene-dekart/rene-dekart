<svg xmlns="http://www.w3.org/2000/svg" width="750" height="730" viewBox="0 0 750 730">
  <style>
    .prompt { font: 600 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #3fb950; }
    .content { font: 400 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #c9d1d9; }
    .bold { font-weight: 600; fill: #f0f6fc; }
    .label { font: 400 12px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #8b949e; }
    .pill-text { font: 400 12px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; text-anchor: middle; dominant-baseline: central; }
    .pill-green { fill: #161b22; stroke: #3fb950; stroke-width: 1; rx: 4; }
    .pill-blue { fill: #161b22; stroke: #58a6ff; stroke-width: 1; rx: 4; }
    .project-name { font: 600 13px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #f0f6fc; }
    .project-desc { font: 400 12px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #8b949e; }
    .project-card { fill: #161b22; stroke: #21262d; stroke-width: 1; rx: 6; }
  </style>

  <!-- Background -->
  <rect width="750" height="730" fill="#0d1117" rx="8"/>
  <rect width="750" height="730" fill="none" stroke="#30363d" rx="8"/>

  <!-- Title bar -->
  <circle cx="20" cy="16" r="6" fill="#f85149"/>
  <circle cx="40" cy="16" r="6" fill="#d29922"/>
  <circle cx="60" cy="16" r="6" fill="#3fb950"/>
  <line x1="0" y1="32" x2="750" y2="32" stroke="#21262d"/>

  <!-- whoami -->
  <text x="20" y="56" class="prompt">➜ whoami</text>
  <text x="20" y="80" class="content"><tspan class="bold">rene-dekart</tspan></text>

  <!-- uptime -->
  <text x="20" y="112" class="prompt">➜ uptime</text>
  <text x="20" y="136" class="content"><tspan class="bold">6</tspan> years of commercial experience</text>

  <!-- skills -->
  <text x="20" y="168" class="prompt">➜ ls ~/skills/</text>

  <text x="20" y="194" class="label">[backend]</text>
  <rect x="20"  y="202" width="56" height="24" class="pill-green"/>
  <text x="48"  y="214" class="pill-text" fill="#3fb950">Java</text>
  <rect x="84"  y="202" width="72" height="24" class="pill-green"/>
  <text x="120" y="214" class="pill-text" fill="#3fb950">Python</text>
  <rect x="164" y="202" width="104" height="24" class="pill-green"/>
  <text x="216" y="214" class="pill-text" fill="#3fb950">TypeScript</text>

  <text x="20" y="250" class="label">[frameworks]</text>
  <rect x="20"  y="258" width="108" height="24" class="pill-green"/>
  <text x="74"  y="270" class="pill-text" fill="#3fb950">Spring Boot</text>
  <rect x="136" y="258" width="76" height="24" class="pill-green"/>
  <text x="174" y="270" class="pill-text" fill="#3fb950">FastAPI</text>

  <text x="20" y="306" class="label">[blockchain]</text>
  <rect x="20" y="314" width="162" height="24" class="pill-green"/>
  <text x="101" y="326" class="pill-text" fill="#3fb950">Hyperledger Fabric</text>

  <text x="20" y="362" class="label">[database]</text>
  <rect x="20"  y="370" width="100" height="24" class="pill-blue"/>
  <text x="70"  y="382" class="pill-text" fill="#58a6ff">PostgreSQL</text>
  <rect x="128" y="370" width="124" height="24" class="pill-blue"/>
  <text x="190" y="382" class="pill-text" fill="#58a6ff">Elasticsearch</text>

  <!-- projects -->
  <text x="20" y="422" class="prompt">➜ ls ~/projects/</text>

  <rect x="20"  y="440" width="350" height="52" class="project-card"/>
  <text x="34"  y="458" class="project-name">[project-one]</text>
  <text x="34"  y="478" class="project-desc">High-performance API gateway</text>
  <rect x="270" y="448" width="42" height="18" class="pill-green"/>
  <text x="291" y="457" class="pill-text" fill="#3fb950" font-size="10">Go</text>
  <rect x="318" y="448" width="42" height="18" class="pill-blue"/>
  <text x="339" y="457" class="pill-text" fill="#58a6ff" font-size="10">Redis</text>

  <rect x="380" y="440" width="350" height="52" class="project-card"/>
  <text x="394" y="458" class="project-name">[project-two]</text>
  <text x="394" y="478" class="project-desc">Real-time data pipeline</text>
  <rect x="610" y="448" width="62" height="18" class="pill-green"/>
  <text x="641" y="457" class="pill-text" fill="#3fb950" font-size="10">Python</text>
  <rect x="678" y="448" width="42" height="18" class="pill-blue"/>
  <text x="699" y="457" class="pill-text" fill="#58a6ff" font-size="10">PgSQL</text>

  <rect x="20"  y="500" width="350" height="52" class="project-card"/>
  <text x="34"  y="518" class="project-name">[project-three]</text>
  <text x="34"  y="538" class="project-desc">Microservices auth system</text>
  <rect x="254" y="508" width="60" height="18" class="pill-green"/>
  <text x="284" y="517" class="pill-text" fill="#3fb950" font-size="10">Node.js</text>
  <rect x="320" y="508" width="42" height="18" class="pill-blue"/>
  <text x="341" y="517" class="pill-text" fill="#58a6ff" font-size="10">Mongo</text>

  <rect x="380" y="500" width="350" height="52" class="project-card"/>
  <text x="394" y="518" class="project-name">[project-four]</text>
  <text x="394" y="538" class="project-desc">CLI tool for schema management</text>
  <rect x="678" y="508" width="42" height="18" class="pill-green"/>
  <text x="699" y="517" class="pill-text" fill="#3fb950" font-size="10">Go</text>

  <!-- focus -->
  <text x="20" y="582" class="prompt">➜ echo $CURRENT_FOCUS</text>
  <text x="20" y="606" class="content">Currently working on <tspan class="bold">___</tspan></text>

  <!-- connect -->
  <text x="20" y="638" class="prompt">➜ connect --list</text>
  <rect x="20"  y="650" width="72" height="24" class="pill-green"/>
  <text x="56"  y="662" class="pill-text" fill="#3fb950">Email</text>
  <rect x="100" y="650" width="92" height="24" class="pill-green"/>
  <text x="146" y="662" class="pill-text" fill="#3fb950">Telegram</text>

  <!-- gh stats -->
  <text x="20" y="706" class="prompt">➜ gh stats</text>
</svg>